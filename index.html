<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blessed by the Snail</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c;
      --deep-gold: #7a5c1e;
      --cream: #f5e9c8;
      --dark: #0e0b05;
      --glow: #ffe28a;
      --snail-green: #4a7c59;
      --moss: #2e4d35;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'IM Fell English SC', serif;
    }

    /* Radial background glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 50%,
        rgba(74, 124, 89, 0.18) 0%,
        rgba(201, 168, 76, 0.07) 40%,
        transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Particle stars */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      animation: drift linear infinite;
    }

    @keyframes drift {
      0%   { opacity: 0; transform: translateY(0) scale(1); }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.4; }
      100% { opacity: 0; transform: translateY(-100vh) scale(0.3); }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 50px 70px;
      max-width: 760px;
      width: 90%;
    }

    /* Decorative border frame */
    .frame {
      position: absolute;
      inset: 0;
      border: 2px solid var(--gold);
      border-radius: 4px;
      opacity: 0.5;
      pointer-events: none;
    }
    .frame::before, .frame::after {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid var(--deep-gold);
      border-radius: 2px;
      opacity: 0.6;
    }
    .frame::after { inset: 12px; opacity: 0.3; }

    /* Corner ornaments */
    .corner {
      position: absolute;
      width: 36px;
      height: 36px;
      opacity: 0.7;
    }
    .corner svg { width: 100%; height: 100%; }
    .corner.tl { top: -4px; left: -4px; }
    .corner.tr { top: -4px; right: -4px; transform: scaleX(-1); }
    .corner.bl { bottom: -4px; left: -4px; transform: scaleY(-1); }
    .corner.br { bottom: -4px; right: -4px; transform: scale(-1); }

    /* Snail SVG */
    .snail-wrap {
      margin: 0 auto 28px;
      width: 120px;
      height: 90px;
      position: relative;
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 0 18px rgba(201,168,76,0.5));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* Divine rays behind snail */
    .rays {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      animation: spin 18s linear infinite;
      opacity: 0.15;
      z-index: -1;
    }

    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    /* Header label */
    .eyebrow {
      font-family: 'IM Fell English SC', serif;
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      color: var(--gold);
      opacity: 0.75;
      margin-bottom: 14px;
      animation: fadeUp 1.2s ease both;
    }

    /* Main title */
    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-weight: 900;
      font-size: clamp(1.8rem, 5vw, 3rem);
      line-height: 1.15;
      color: var(--cream);
      text-shadow:
        0 0 30px rgba(201,168,76,0.6),
        0 0 60px rgba(201,168,76,0.2);
      margin-bottom: 8px;
      animation: fadeUp 1.4s ease both;
    }

    h1 span.highlight {
      color: var(--gold);
      display: inline-block;
      position: relative;
    }

    /* Underline accent under title */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 22px auto 28px;
      opacity: 0.6;
      animation: fadeUp 1.6s ease both;
    }
    .divider-line {
      height: 1px;
      width: 80px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .divider-line.r { transform: scaleX(-1); }
    .divider-gem {
      width: 6px; height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    /* Body text */
    .body-text {
      font-family: 'IM Fell English SC', serif;
      font-size: clamp(1rem, 2.5vw, 1.22rem);
      line-height: 1.85;
      color: var(--cream);
      opacity: 0.88;
      max-width: 560px;
      margin: 0 auto 36px;
      animation: fadeUp 1.8s ease both;
    }

    .body-text em {
      font-style: italic;
      color: var(--gold);
    }

    /* Thank You badge */
    .badge {
      display: inline-block;
      padding: 12px 40px;
      border: 1.5px solid var(--gold);
      color: var(--gold);
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      animation: fadeUp 2s ease both;
    }

    .badge::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(201,168,76,0.12) 50%, transparent 100%);
      transform: translateX(-100%);
      animation: shimmer 3s ease-in-out infinite 2.5s;
    }

    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Moss-trail beneath card */
    .trail {
      position: absolute;
      bottom: -3px;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 4px;
      background: linear-gradient(to right, transparent, var(--snail-green), var(--gold), var(--snail-green), transparent);
      opacity: 0.45;
      border-radius: 2px;
      animation: trailGlow 3s ease-in-out infinite alternate;
    }

    @keyframes trailGlow {
      from { opacity: 0.3; }
      to   { opacity: 0.65; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="card">
  <div class="frame"></div>

  <!-- Corner ornaments -->
  <div class="corner tl">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 34 L2 2 L34 2" stroke="#c9a84c" stroke-width="1.5"/>
      <circle cx="2" cy="2" r="3" fill="#c9a84c"/>
      <path d="M8 28 L8 8 L28 8" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>
    </svg>
  </div>
  <div class="corner tr"><svg viewBox="0 0 36 36" fill="none"><path d="M2 34 L2 2 L34 2" stroke="#c9a84c" stroke-width="1.5"/><circle cx="2" cy="2" r="3" fill="#c9a84c"/><path d="M8 28 L8 8 L28 8" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/></svg></div>
  <div class="corner bl"><svg viewBox="0 0 36 36" fill="none"><path d="M2 34 L2 2 L34 2" stroke="#c9a84c" stroke-width="1.5"/><circle cx="2" cy="2" r="3" fill="#c9a84c"/><path d="M8 28 L8 8 L28 8" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/></svg></div>
  <div class="corner br"><svg viewBox="0 0 36 36" fill="none"><path d="M2 34 L2 2 L34 2" stroke="#c9a84c" stroke-width="1.5"/><circle cx="2" cy="2" r="3" fill="#c9a84c"/><path d="M8 28 L8 8 L28 8" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/></svg></div>

  <!-- Divine rays -->
  <div class="snail-wrap">
    <svg class="rays" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(100,100)">
        <line x1="0" y1="-90" x2="0" y2="90" stroke="#c9a84c" stroke-width="1"/>
        <line x1="-90" y1="0" x2="90" y2="0" stroke="#c9a84c" stroke-width="1"/>
        <line x1="-64" y1="-64" x2="64" y2="64" stroke="#c9a84c" stroke-width="1"/>
        <line x1="64" y1="-64" x2="-64" y2="64" stroke="#c9a84c" stroke-width="1"/>
        <line x1="-34" y1="-82" x2="34" y2="82" stroke="#c9a84c" stroke-width="0.6"/>
        <line x1="34" y1="-82" x2="-34" y2="82" stroke="#c9a84c" stroke-width="0.6"/>
        <line x1="-82" y1="-34" x2="82" y2="34" stroke="#c9a84c" stroke-width="0.6"/>
        <line x1="82" y1="-34" x2="-82" y2="34" stroke="#c9a84c" stroke-width="0.6"/>
      </g>
    </svg>

    <!-- Snail SVG illustration -->
    <svg viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;position:relative;z-index:1;">
      <!-- Shell spiral -->
      <ellipse cx="72" cy="48" rx="36" ry="32" fill="#4a7c59" stroke="#c9a84c" stroke-width="1.5"/>
      <ellipse cx="72" cy="48" rx="25" ry="22" fill="#2e4d35" stroke="#c9a84c" stroke-width="1"/>
      <ellipse cx="72" cy="48" rx="15" ry="13" fill="#4a7c59" stroke="#c9a84c" stroke-width="0.8"/>
      <ellipse cx="72" cy="48" rx="7" ry="6" fill="#2e4d35" stroke="#c9a84c" stroke-width="0.5"/>
      <!-- Gold sheen on shell -->
      <ellipse cx="60" cy="36" rx="8" ry="5" fill="rgba(201,168,76,0.18)" rx="8"/>
      <!-- Body -->
      <path d="M36 60 Q20 65 10 58 Q5 52 16 50 Q28 48 40 55 Z" fill="#6aab7a" stroke="#4a7c59" stroke-width="1"/>
      <!-- Head -->
      <ellipse cx="16" cy="50" rx="10" ry="7" fill="#6aab7a" stroke="#4a7c59" stroke-width="1"/>
      <!-- Eyes on stalks -->
      <line x1="11" y1="45" x2="8" y2="36" stroke="#6aab7a" stroke-width="2" stroke-linecap="round"/>
      <line x1="17" y1="44" x2="16" y2="34" stroke="#6aab7a" stroke-width="2" stroke-linecap="round"/>
      <circle cx="8" cy="35" r="3.5" fill="#c9a84c"/>
      <circle cx="16" cy="33" r="3.5" fill="#c9a84c"/>
      <circle cx="8" cy="35" r="1.5" fill="#0e0b05"/>
      <circle cx="16" cy="33" r="1.5" fill="#0e0b05"/>
      <!-- Smile -->
      <path d="M12 52 Q16 55 20 52" stroke="#0e0b05" stroke-width="1" fill="none" stroke-linecap="round"/>
      <!-- Slime trail -->
      <path d="M36 63 Q60 70 80 68" stroke="#4a7c59" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
    </svg>
  </div>

  <p class="eyebrow">✦ A Sacred Gathering ✦</p>

  <h1>Thank You for<br><span class="highlight">Hailing the Snail</span><br>Together</h1>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-gem"></div>
    <div class="divider-gem" style="opacity:0.5;width:4px;height:4px;"></div>
    <div class="divider-gem"></div>
    <div class="divider-line r"></div>
  </div>

  <p class="body-text">
    We have been <em>blessed by the Snail</em> to have this opportunity.<br>
    May its slow and steadfast wisdom guide us all forward.<br><br>
    Thank you — <em>each and every one of you</em>.
  </p>

  <div class="badge">Thank You All</div>

  <div class="trail"></div>
</div>

<script>
  // Generate floating particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 55; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    p.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100 + 100}%;
      animation-duration: ${Math.random() * 12 + 8}s;
      animation-delay: ${Math.random() * 8}s;
      background: ${Math.random() > 0.5 ? '#c9a84c' : '#6aab7a'};
      opacity: ${Math.random() * 0.6};
    `;
    container.appendChild(p);
  }
</script>
</body>
</html>
